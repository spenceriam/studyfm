<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Code.FM</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Alegreya:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #0e1726; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; overflow: hidden; }
  * { box-sizing: border-box; }
  #loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.4s; }
  #loader.hidden { opacity: 0; pointer-events: none; }
  #loader .ring { width: 40px; height: 40px; border: 3px solid rgba(245,235,205,0.15); border-top-color: #f3e6c7; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<!-- Local React production builds — no CDN dependency -->
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
</head>
<body>
<div id="root"></div>
<div id="loader"><div class="ring"></div></div>

<!-- Live stream audio — controlled by React components -->
<audio id="streamAudio" crossorigin="anonymous" preload="none">
  <source src="/stream" type="audio/mpeg">
</audio>

<!-- Pre-compiled JS — no Babel runtime needed -->
<script src="vendor/motifs-woodcut.js"></script>
<script src="vendor/photo.js"></script>
<script src="vendor/player-shared.js"></script>
<script src="vendor/app-20260523-0500.js"></script>

<script>
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(CodeFM));
document.getElementById('loader').classList.add('hidden');
setTimeout(()=>{ document.getElementById('loader').remove(); }, 500);
</script>

<div id="now" style="
  position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:9999;
  background:rgba(14,17,26,0.85);padding:8px 20px 6px;
  border-radius:0 0 10px 10px;border:1px solid rgba(243,230,199,0.12);border-top:none;
  font-family:'IBM Plex Mono',monospace;color:#f3e6c7;text-align:center;
  pointer-events:none;font-size:11px;letter-spacing:1px;
">Code.FM</div>
<script>(function(){
var e=document.getElementById('now');
function update(){fetch('/status').then(function(r){return r.json()}).then(function(s){
if(s.block_name&&s.track_title){
e.innerHTML='<b>0'+s.track_number+'</b> <span style="opacity:0.6">'+s.block_name+'</span> — '+s.track_title;
}
}).catch(function(){})}
update();
setInterval(update,5000);
})();</script>

</body>
</html>
